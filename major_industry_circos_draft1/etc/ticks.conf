# Tick marks configuration

show_ticks          = yes
show_tick_labels    = yes

<ticks>

  radius           = 1r
  color            = black
  thickness        = 2p
  multiplier       = 1e-3
  format           = %d

  # Major tick marks
  <tick>
    spacing        = 5000u
    size           = 10p
    show_label     = yes
    label_size     = 12p
    label_offset   = 5p
    format         = %.1f
  </tick>

  # Minor tick marks
  <tick>
    spacing        = 1000u
    size           = 5p
    show_label     = no
  </tick>

</ticks>
