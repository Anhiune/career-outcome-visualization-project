# Colors, fonts, and patterns configuration
# This file pulls in Circos defaults and adds custom definitions

# Include default Circos colors (includes chr1-chr22 colors)
<<include colors.conf>>

# Include default fonts
<<include fonts.conf>>

# Include default patterns
<<include patterns.conf>>

# Custom color definitions for alpha transparency
# These provide semi-transparent versions of the chromosome colors
<colors>
  chr1_a6 = 153,102,204,0.6
  chr2_a6 = 102,153,204,0.6
  chr3_a6 = 153,204,102,0.6
  chr4_a6 = 204,153,102,0.6
  chr5_a6 = 204,102,153,0.6
  chr6_a6 = 102,204,153,0.6
  chr7_a6 = 204,204,102,0.6
  chr8_a6 = 102,204,204,0.6
  chr9_a6 = 204,102,204,0.6
  chr10_a6 = 153,153,204,0.6
</colors>
