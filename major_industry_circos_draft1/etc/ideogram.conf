# Ideogram configuration - controls the outer ring segments

<ideogram>

  <spacing>
    # Spacing between ideograms (segments)
    default = 0.005r
    
    # Add a break between majors and industries for visual separation
    <pairwise M4 I1>
      spacing = 5r
    </pairwise>
  </spacing>

  # Ideogram position, thickness and fill
  radius           = 0.90r
  thickness        = 30p
  fill             = yes
  stroke_color     = dgrey
  stroke_thickness = 2p

  # Label configuration
  show_label       = yes
  label_font       = default
  label_radius     = 1.05r
  label_size       = 24
  label_parallel   = yes

</ideogram>
