# Circos configuration file for Major-Industry chord diagram

# Chromosome/segment definitions
karyotype = data/karyotype.txt

# Chromosomes to show - all of them
chromosomes_units = 1
chromosomes_display_default = yes

# Image output settings
<image>
  dir   = .
  file  = major_industry_circos.png
  png   = yes
  svg   = yes
  radius         = 1500p
  background     = white
  angle_offset   = -90
  auto_alpha_colors = yes
  auto_alpha_steps  = 5
</image>

# Ideogram configuration (the outer ring segments)
<ideogram>

  <spacing>
    default = 0.005r
    <pairwise M4 I1>
      spacing = 5r
    </pairwise>
  </spacing>

  radius           = 0.90r
  thickness        = 30p
  fill             = yes
  stroke_color     = dgrey
  stroke_thickness = 2p

  show_label       = yes
  label_font       = default
  label_radius     = 1.05r
  label_size       = 24
  label_parallel   = yes

</ideogram>

# Tick marks
show_ticks          = yes
show_tick_labels    = yes

<ticks>
  radius           = 1r
  color            = black
  thickness        = 2p
  multiplier       = 1e-3
  format           = %d

  <tick>
    spacing        = 5000u
    size           = 10p
    show_label     = yes
    label_size     = 12p
    label_offset   = 5p
    format         = %.1f
  </tick>

  <tick>
    spacing        = 1000u
    size           = 5p
    show_label     = no
  </tick>
</ticks>

# Links (ribbons) connecting majors to industries
<links>
  <link>
    file = data/single_links.txt
    radius = 0.99r
    bezier_radius = 0.1r
    thickness = 2
    ribbon = yes
  </link>
</links>

# Custom colors for alpha transparency ribbons
<colors>
  chr1_a6 = 153,102,204,0.6
  chr2_a6 = 102,153,204,0.6
  chr3_a6 = 153,204,102,0.6
  chr4_a6 = 204,153,102,0.6
  chr5_a6 = 204,102,153,0.6
  chr6_a6 = 102,204,153,0.6
  chr7_a6 = 204,204,102,0.6
  chr8_a6 = 102,204,204,0.6
  chr9_a6 = 204,102,204,0.6
  chr10_a6 = 153,153,204,0.6
</colors>

# Include Circos default configuration files
