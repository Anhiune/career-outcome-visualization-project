# Housekeeping parameters - system configuration

anglestep       = 0.5
minslicestep    = 10
beziersamples   = 40
debug           = no
warnings        = no
imagemap        = no

# Suppress common warnings
data_out_of_range = warning

# Units
units_ok        = bupr
units_nounit    = n

# SVG options
svg_font_scale  = 1.3

# File delimiter
file_delim = \s

# Anti-aliasing (for PNG output)
anti_aliasing = yes
